statements:
  - type: "NORMAL"
    sql: |
      CREATE OR REPLACE TEMPORARY VIEW user_behavior_source AS
      SELECT
        user_id,
        event_type,
        duration_sec,
        event_time
      FROM UDA_catalog.ods.user_behavior

  - type: "NORMAL"
    sql: |
      CREATE OR REPLACE TEMPORARY VIEW user_behavior_sum_view AS
      SELECT
        event_type,
        COUNT(*) AS event_count,
        SUM(duration_sec) AS total_duration_sec,
        AVG(duration_sec) AS avg_duration_sec
      FROM user_behavior_source
      GROUP BY event_type
  
  - type: "NORMAL"
    sql: |
      CREATE TABLE IF NOT EXISTS sr_user_behavior_sum
      USING starrocks
      OPTIONS (
        "starrocks.table.identifier" = "db1.user_behavior_sum"
      )

  - type: "NORMAL"
    sql: |
      INSERT INTO sr_user_behavior_sum
      SELECT
        event_type,
        event_count,
        total_duration_sec,
        avg_duration_sec
      FROM user_behavior_sum_view

  
